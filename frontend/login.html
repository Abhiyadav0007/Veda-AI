<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veda AI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* LOGO */
    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      filter: drop-shadow(0 4px 20px rgba(108, 99, 255, 0.5));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .logo-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #fff;
    }

    .logo-title span {
      color: #6c63ff;
    }

    .logo-subtitle {
      font-size: 14px;
      color: #666;
      text-align: center;
      line-height: 1.6;
    }

    /* LOGIN CARD */
    .login-card {
      width: 100%;
      background: #161616;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      color: #fff;
    }

    .card-subtitle {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin-top: -12px;
    }

    /* GOOGLE BUTTON */
    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #fff;
      color: #333;
      border: none;
      padding: 14px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    .google-btn:hover {
      background: #f0f0f0;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(255,255,255,0.1);
    }

    .google-btn:active {
      transform: scale(0.98);
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #444;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }

    /* EMAIL FORM */
    .email-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: #6c63ff;
    }

    .form-input::placeholder {
      color: #444;
    }

    .submit-btn {
      width: 100%;
      background: #6c63ff;
      color: white;
      border: none;
      padding: 13px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    .submit-btn:hover {
      background: #574fd6;
      transform: translateY(-1px);
    }

    .toggle-auth {
      text-align: center;
      font-size: 13px;
      color: #666;
    }

    .toggle-auth span {
      color: #6c63ff;
      cursor: pointer;
      font-weight: 500;
    }

    .toggle-auth span:hover {
      text-decoration: underline;
    }

    /* ERROR MESSAGE */
    .error-msg {
      background: #3a1a1a;
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    /* LOADING */
    .loading {
      display: none;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    /* FOOTER */
    .login-footer {
      font-size: 12px;
      color: #444;
      text-align: center;
    }

    /* BACKGROUND GLOW */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="login-container">

    <!-- LOGO -->
    <div class="logo-section">
      <svg class="logo-icon" width="64" height="64" viewBox="0 0 38 38" fill="none">
        <defs>
          <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6c63ff"/>
            <stop offset="100%" style="stop-color:#a78bfa"/>
          </linearGradient>
        </defs>
        <circle cx="19" cy="19" r="19" fill="url(#lg)"/>
        <circle cx="19" cy="19" r="7" fill="none" stroke="white" stroke-width="1.5"/>
        <line x1="19" y1="4" x2="19" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="19" y1="26" x2="19" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="4" y1="19" x2="12" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="26" y1="19" x2="34" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8.5" y1="8.5" x2="14" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="24" y1="24" x2="29.5" y2="29.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="29.5" y1="8.5" x2="24" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8.5" y1="29.5" x2="14" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="19" cy="19" r="3" fill="white"/>
      </svg>
      <div class="logo-title">Veda <span>AI</span></div>
      <div class="logo-subtitle">Your personal AI assistant.<br/>Sign in to start chatting.</div>
    </div>

    <!-- LOGIN CARD -->
    <div class="login-card">
      <div class="card-title" id="card-title">Welcome back</div>
      <div class="card-subtitle" id="card-subtitle">Sign in to continue to Veda AI</div>

      <!-- ERROR -->
      <div class="error-msg" id="error-msg"></div>
      <div class="loading" id="loading">Please wait...</div>

      <!-- GOOGLE LOGIN -->
      <button class="google-btn" onclick="loginWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <!-- EMAIL FORM -->
      <div class="email-form" id="email-form">
        <input type="email" class="form-input" id="email-input" placeholder="Email address"/>
        <input type="password" class="form-input" id="password-input" placeholder="Password"/>
        <button class="submit-btn" id="submit-btn" onclick="handleEmailAuth()">Sign In</button>
        <div class="toggle-auth">
          Don't have an account? <span onclick="toggleAuthMode()">Sign up</span>
        </div>
      </div>

    </div>

    <div class="login-footer">
      By continuing you agree to Veda AI's Terms of Service
    </div>

  </div>

  <script src="./firebase-config.js"></script>
  <script>
    // Add Auth to firebase-config
    const auth = firebase.auth();
    var isSignUp = false;

    // Check if already logged in
    auth.onAuthStateChanged(function(user) {
      if (user) {
        window.location.href = "index.html";
      }
    });

    // Google Login
    function loginWithGoogle() {
      showLoading(true);
      var provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(function(result) {
          window.location.href = "index.html";
        })
        .catch(function(error) {
          showError(error.message);
          showLoading(false);
        });
    }

    // Email Login or Signup
    function handleEmailAuth() {
      var email = document.getElementById("email-input").value.trim();
      var password = document.getElementById("password-input").value.trim();

      if (!email || !password) {
        showError("Please enter email and password");
        return;
      }

      showLoading(true);

      if (isSignUp) {
        auth.createUserWithEmailAndPassword(email, password)
          .then(function() {
            window.location.href = "index.html";
          })
          .catch(function(error) {
            showError(error.message);
            showLoading(false);
          });
      } else {
        auth.signInWithEmailAndPassword(email, password)
          .then(function() {
            window.location.href = "index.html";
          })
          .catch(function(error) {
            showError(error.message);
            showLoading(false);
          });
      }
    }

    // Toggle between Sign In and Sign Up
    function toggleAuthMode() {
      isSignUp = !isSignUp;
      document.getElementById("card-title").textContent = isSignUp ? "Create account" : "Welcome back";
      document.getElementById("card-subtitle").textContent = isSignUp ? "Sign up to get started with Veda AI" : "Sign in to continue to Veda AI";
      document.getElementById("submit-btn").textContent = isSignUp ? "Sign Up" : "Sign In";
      document.querySelector(".toggle-auth").innerHTML = isSignUp
        ? 'Already have an account? <span onclick="toggleAuthMode()">Sign in</span>'
        : 'Don\'t have an account? <span onclick="toggleAuthMode()">Sign up</span>';
      hideError();
    }

    function showError(msg) {
      var el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = "block";
    }

    function hideError() {
      document.getElementById("error-msg").style.display = "none";
    }

    function showLoading(show) {
      document.getElementById("loading").style.display = show ? "block" : "none";
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") handleEmailAuth();
    });
  </script>

</body>
</html>
